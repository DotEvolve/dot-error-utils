name: CI
on:
  push:
    branches: [master, develop]
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
      - run: rm package-lock.json && npm install
      - run: npm run build
      - run: npm test
