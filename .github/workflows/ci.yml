name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm ci
      - name: Check Formatting
        run: npx prettier --check . --ignore-unknown
      - name: Run tests
        run: npm test
      - name: Build package
        run: npm run build
