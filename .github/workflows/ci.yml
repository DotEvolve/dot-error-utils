name: CI
on:
  push:
    branches: [master, dev]
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@dotevolve"
      - run: rm -f package-lock.json && npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm run build
      - run: npm test
